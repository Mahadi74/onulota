server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache the HTML shell — ensures browsers always fetch the latest
    # index.html with up-to-date Vite asset fingerprints after a deployment.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # SPA fallback — unknown paths (e.g. /products/:id) get index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Versioned static assets: long-lived cache is safe because Vite
    # content-hashes every filename (index-abc123.js, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
