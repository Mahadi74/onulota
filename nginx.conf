events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:5000;
    }

    # Detect social media crawlers — must be in http{} block
    map $http_user_agent $is_social_crawler {
        default                         0;
        ~*facebookexternalhit           1;
        ~*Facebot                       1;
        ~*WhatsApp                      1;
        ~*Twitterbot                    1;
        ~*LinkedInBot                   1;
        ~*TelegramBot                   1;
        ~*Slackbot                      1;
        ~*Discordbot                    1;
        ~*developers\.google\.com       1;
    }

    server {
        listen 80;

        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Social share / OG tag pages — served by backend so crawlers get meta tags
        location /share {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }

        # /products/:id — crawlers get OG tags from backend, browsers get React SPA
        # "rewrite + last" is safe inside if; avoids the "if is evil" proxy_pass issue
        location ~ ^/products/([a-f0-9]{24})$ {
            if ($is_social_crawler) {
                rewrite ^/products/([a-f0-9]{24})$ /share/products/$1 last;
            }
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # robots.txt — allow social crawlers
        location = /robots.txt {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
